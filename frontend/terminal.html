<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pie Office Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar-w: 260px;
      --bg-primary: #1a1a2e;
      --bg-sidebar: #19171D;
      --bg-sidebar-hover: #27242C;
      --bg-sidebar-active: #1164A3;
      --bg-header: #212529;
      --text-primary: #D1D2D3;
      --text-secondary: #ABABAD;
      --text-muted: #696969;
      --accent: #E8D44D;
      --green: #2BAC76;
      --red: #E01E5A;
      --border: #383538;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh; height: 100dvh;
      width: 100vw;
      overflow: hidden;
      /* Prevent iOS bounce scroll */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    /* Auth Screen */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }
    #auth-screen h1 { font-size: 20px; color: var(--accent); font-weight: 700; }
    #auth-screen input {
      background: var(--bg-sidebar);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 12px 16px;
      font-size: 16px;
      width: min(320px, 80vw);
      border-radius: 8px;
      outline: none;
    }
    #auth-screen input:focus { border-color: var(--bg-sidebar-active); }
    #auth-screen button {
      background: var(--bg-sidebar-active);
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    #auth-error { color: var(--red); font-size: 13px; }

    /* Main Layout (Slack-style) */
    #main-layout {
      display: none;
      height: 100%;
      flex-direction: row;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #sidebar-header h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }
    #sidebar-header .sync-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-left: 8px;
    }
    #sidebar-header .sync-indicator.syncing {
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }

    .section-label {
      padding: 12px 16px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .session-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      gap: 10px;
      margin-bottom: 2px;
      transition: background 0.1s;
    }
    .session-item:hover { background: var(--bg-sidebar-hover); }
    .session-item.active { background: var(--bg-sidebar-active); }
    .session-item.active .session-name { color: #fff; font-weight: 700; }
    .session-item.active .session-cwd { color: rgba(255,255,255,0.7); }

    .session-status {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .session-status.attached { background: var(--green); }
    .session-status.detached { background: var(--text-muted); border: 1.5px solid var(--text-muted); background: transparent; }

    .session-info { overflow: hidden; }
    .session-name {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-cwd {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-sessions {
      padding: 16px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    /* Right Panel */
    #right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #terminal-header {
      padding: 8px 16px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
    }
    #terminal-header .left { display: flex; align-items: center; gap: 8px; }
    #terminal-header .session-title { font-size: 14px; font-weight: 700; }
    #terminal-header .status {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #terminal-header .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.connected { background: var(--green); }
    .status-dot.disconnected { background: var(--red); }
    .status-dot.connecting { background: var(--accent); animation: pulse 1s infinite; }

    #disconnect-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    #disconnect-btn:hover { color: var(--red); border-color: var(--red); }

    #terminal-container { flex: 1; overflow: hidden; }
    .xterm-viewport { overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; }

    /* Quick action bar */
    #quick-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 8px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input-bar {
      display: flex;
      gap: 6px;
    }
    #input-bar input {
      flex: 1;
      background: var(--bg-sidebar);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: monospace;
      outline: none;
    }
    #input-bar input:focus { border-color: var(--bg-sidebar-active); }
    #input-bar button {
      background: var(--bg-sidebar-active);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #action-buttons {
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }
    #action-buttons button {
      background: var(--bg-sidebar);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #action-buttons button:active { background: var(--bg-sidebar-active); color: #fff; }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Mobile: sidebar as slide-out drawer */
    #sidebar-toggle {
      display: none;
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 100;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 36px; height: 36px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
    }

    @media (max-width: 600px) {
      #sidebar {
        position: fixed;
        left: calc(-1 * var(--sidebar-w));
        top: 0; bottom: 0;
        z-index: 50;
        transition: left 0.25s ease;
      }
      #sidebar.open { left: 0; }
      #sidebar-overlay.open { display: block; }
      #sidebar-toggle { display: flex; }
      #terminal-header { padding-left: 52px; }
    }
  </style>
</head>
<body>
  <!-- Auth Screen (shown while acquiring session token via mTLS) -->
  <div id="auth-screen">
    <h1>Pie Office Terminal</h1>
    <div style="color: var(--text-muted); font-size: 14px;">Authenticating device...</div>
    <div id="auth-error"></div>
  </div>

  <!-- Main Layout (shown after auth) -->
  <div id="main-layout">
    <button id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Claude Sessions <span id="sync-dot" class="sync-indicator"></span></h2>
      </div>
      <div class="section-label">Active</div>
      <div id="session-list"></div>
    </div>

    <div id="right-panel">
      <div id="terminal-header" style="display:none;">
        <div class="left">
          <span class="session-title" id="session-title"></span>
          <span class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text"></span>
          </span>
        </div>
        <button id="disconnect-btn" onclick="disconnectSession()">Disconnect</button>
      </div>
      <div id="empty-state">Select a session from the sidebar</div>
      <div id="terminal-container"></div>
      <div id="quick-actions" style="display:none;">
        <div id="input-bar">
          <input type="text" id="term-input" placeholder="Type here (IME supported)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <button onclick="sendInput()">Send</button>
        </div>
        <div id="action-buttons">
          <button onclick="sendQuick('1\n')">1</button>
          <button onclick="sendQuick('2\n')">2</button>
          <button onclick="sendQuick('3\n')">3</button>
          <button onclick="sendQuick('y\n')">y</button>
          <button onclick="sendQuick('n\n')">n</button>
          <button onclick="sendQuick('\n')">Enter</button>
          <button onclick="scrollBottom()">&#8595;</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script src="/static/js/terminal-client.js"></script>
</body>
</html>
